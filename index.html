<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightning Stacker Space</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 4vw, 3rem);
      padding: clamp(1rem, 4vw, 2rem);
    }

    .logo-wrap {
      width: clamp(220px, 50vw, 480px);
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .tagline {
      font-size: clamp(0.78rem, 2.2vw, 1rem);
      color: #888;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0 1rem;
    }

    .tips-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .qr-wrapper {
      background: #fff;
      padding: clamp(10px, 2vw, 16px);
      border-radius: 8px;
      width: clamp(140px, 35vw, 200px);
      height: clamp(140px, 35vw, 200px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-wrapper svg {
      width: 100%;
      height: 100%;
    }

    .tips-address {
      font-size: clamp(0.8rem, 3vw, 1.05rem);
      color: #f7931a;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .tips-label {
      font-size: clamp(0.65rem, 1.8vw, 0.75rem);
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
    }

    .tips-also {
      font-size: clamp(0.65rem, 1.8vw, 0.75rem);
      color: #444;
      text-align: center;
    }

    .tips-also span {
      color: #666;
    }

    .tips-also small {
      color: #333;
      font-size: 0.85em;
    }

    footer {
      font-size: clamp(0.6rem, 1.5vw, 0.7rem);
      color: #333;
      letter-spacing: 0.08em;
    }

    .site-nav { display: flex; justify-content: center; }

    .nav-link {
      font-size: clamp(0.65rem, 1.8vw, 0.75rem);
      color: #555;
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.15s;
    }

    .nav-link:hover { color: #f7931a; }
  </style>
</head>
